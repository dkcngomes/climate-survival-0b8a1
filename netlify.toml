# ─────────────────────────────────────────────────────────
# Netlify Configuration — Climate Survival (Frontend)
# Base directory: frontend/ (Next.js static export)
# ─────────────────────────────────────────────────────────

[build]
  base    = "frontend/"
  command = "npm ci && npm run build"
  publish = "out/"

# ── Proxy API requests to Render backend ──
# This avoids CORS issues: browser talks to the same origin,
# Netlify forwards /api/* to the backend.
[[redirects]]
  from = "/api/*"
  to   = "https://climate-survival-api.onrender.com/api/:splat"
  status = 200
  force = true

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ─────────────────────────────────────────────────────────
# Netlify Configuration — Climate Survival (Frontend)
# Base directory: frontend/ (Next.js static export)
# ─────────────────────────────────────────────────────────

[build]
  base    = "frontend/"
  command = "npm ci && npm run build"
  publish = "out/"

# ── Proxy API requests to Hugging Face Space ──
# ⚠️ Replace YOUR_HF_USERNAME below with your Hugging Face username
# The Space name must match what you create on huggingface.co
[[redirects]]
  from = "/api/*"
  to   = "https://YOUR_HF_USERNAME-climate-survival-api.hf.space/api/:splat"
  status = 200
  force = true

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

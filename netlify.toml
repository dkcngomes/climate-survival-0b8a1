# ─────────────────────────────────────────────────────────
# Netlify Configuration — Climate Survival (Frontend)
# Base directory: frontend/ (Next.js static export)
# ─────────────────────────────────────────────────────────

[build]
  base    = "frontend/"
  command = "npm install && npm run build"
  publish = "out/"

[build.environment]
  NODE_VERSION = "22"

# ── Proxy API requests to Hugging Face Space ──
[[redirects]]
  from = "/api/*"
  to   = "https://nipunadkcn-climate-survival-api.hf.space/api/:splat"
  status = 200
  force = true

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
